<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StomaQuiz - Atlas de Patologia</title>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 20px; }
        
        .game-container { max-width: 600px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #333; }
        
        /* Sistema de Vidas e Status */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #252525; padding: 10px 20px; border-radius: 50px; }
        #lives-display { font-size: 20px; letter-spacing: 3px; }
        #rank { color: var(--primary); font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        .stats { display: flex; justify-content: space-around; margin: 15px 0; font-size: 14px; color: #bbb; }
        .pts-badge { color: var(--primary); font-size: 20px; font-weight: bold; }

        /* Imagem da Lesão */
        .image-box { position: relative; width: 100%; height: 350px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 2px solid #333; }
        #lesion-image { width: 100%; height: 100%; object-fit: contain; transition: filter 0.5s ease, opacity 0.3s; }
        
        #timer-display { font-size: 32px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* Inputs e Botões */
        #guess-input { width: 90%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #121212; color: white; font-size: 18px; margin-bottom: 15px; text-align: center; }
        #guess-input:focus { border-color: var(--primary); outline: none; }
        
        .actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-check { background: var(--primary); color: #000; flex: 2; }
        .btn-biopsia { background: #ffcc00; color: #000; flex: 1; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Feedback Rápido e Dicas */
        #feedback { padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; display: none; }
        #current-hints-list { text-align: left; background: #252525; padding: 15px; border-radius: 10px; font-size: 14px; line-height: 1.6; }
        .hint-item { border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: 8px; color: #ccc; }

        /* --- MODAL DE REVISÃO --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #222; max-width: 500px; width: 100%; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; }
        #review-title { font-size: 24px; color: var(--primary); margin-bottom: 15px; }
        #review-text { color: #ddd; line-height: 1.6; margin-bottom: 25px; font-size: 16px; }
        .btn-next { background: var(--primary); color: #000; padding: 15px 40px; font-size: 18px; width: 100%; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="status-bar">
            <div id="lives-display">❤️❤️❤️</div>
            <div id="rank">Acadêmico</div>
        </div>

        <div class="stats">
            <div>CASO <span id="case-number">1</span>/30</div>
            <div class="pts-badge"><span id="pts">0</span> pts</div>
        </div>

        <div id="timer-display">45</div>

        <div class="image-box">
            <img id="lesion-image" src="" alt="Amostra Clínica">
        </div>

        <div id="feedback"></div>

        <input type="text" id="guess-input" placeholder="Seu Diagnóstico..." autocomplete="off">
        
        <div class="actions">
            <button class="btn-check" onclick="checkGuess()">VERIFICAR</button>
            <button class="btn-biopsia" onclick="fazerBiopsia()">BIÓPSIA</button>
        </div>

        <div id="current-hints-list">
            <span style="color: #666;">Aguardando submissão...</span>
        </div>
    </div>

    <div id="review-modal" class="modal">
        <div class="modal-content">
            <div id="review-title">✅ ACERTOU!</div>
            <div id="review-text">Explicação sobre a lesão aparecerá aqui...</div>
            <button class="btn-next" onclick="closeReview()">PRÓXIMO CASO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
