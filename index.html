<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StomaQuiz - Atlas de Patologia</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #lives-display { font-size: 24px; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; color: #00ff88; }
        
        .image-container { position: relative; width: 100%; height: 350px; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #lesion-image { width: 100%; height: 100%; object-fit: contain; transition: 0.3s; }
        
        #timer-display { font-size: 30px; font-weight: bold; color: #ff4d4d; margin-bottom: 10px; }
        
        #guess-input { width: 80%; padding: 12px; border-radius: 5px; border: none; font-size: 16px; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #00ff88; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #1a1a1a; }
        button:hover { background: #00cc6e; }

        #current-hints-list { text-align: left; background: #333; padding: 10px; border-radius: 5px; min-height: 50px; font-size: 14px; margin-top: 15px; }
        .hint-item { border-bottom: 1px solid #444; padding: 5px 0; color: #ddd; }
    </style>
</head>
<body>

    <div class="container">
        <h1>StomaQuiz 🦷</h1>
        
        <div id="lives-display">❤️❤️❤️</div>

        <div class="stats">
            <div>Caso: <span id="case-number">1</span>/30</div>
            <div>Pontos: <span id="pts">0</span></div>
        </div>

        <div id="timer-display">45</div>

        <div class="image-container">
            <img id="lesion-image" src="" alt="Carregando imagem...">
        </div>

        <input type="text" id="guess-input" placeholder="Digite o diagnóstico aqui..." autocomplete="off">
        <br>
        <button onclick="checkGuess()">Enviar Diagnóstico</button>

        <div id="current-hints-list">
            Analise a imagem...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
